# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
	${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "mango"
BBFILE_PATTERN_mango = "^${LAYERDIR}/"
# prior to meta-user (7)
BBFILE_PRIORITY_mango = "9"

# This layer depends on the Xilinx BSP layer. (device tree)
LAYERDEPENDS_mango = "core xilinx-bsp"

LAYERSERIES_COMPAT_mango = "scarthgap"
